name: 构建 APK（全新项目重建）

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 检出当前仓库
        uses: actions/checkout@v4

      - name: 创建全新临时项目
        run: |
          # 在 /tmp 下创建新项目
          cd /tmp
          flutter create --org com.example btc_signal_new

      - name: 复制核心代码
        run: |
          # 复制 lib 和 pubspec.yaml
          cp -r $GITHUB_WORKSPACE/lib /tmp/btc_signal_new/
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/btc_signal_new/

          # 手动添加权限（AndroidManifest.xml）
          cd /tmp/btc_signal_new
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' >> android/app/src/main/AndroidManifest.xml

      - name: 构建 APK
        run: |
          cd /tmp/btc_signal_new
          flutter pub get
          flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/btc_signal_new/build/app/outputs/flutter-apk/app-release.apk
