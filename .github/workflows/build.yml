name: 构建 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: 彻底清理 Gradle 缓存
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/dists/
      - name: 重建标准 Android 目录
        run: |
          mv lib lib_backup
          mv pubspec.yaml pubspec_backup.yaml
          rm -rf android
          flutter create .
          rm -rf lib
          mv lib_backup lib
          mv pubspec_backup.yaml pubspec.yaml
      - name: 获取依赖
        run: flutter pub get
      - name: 构建 APK
        run: flutter build apk --release
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
