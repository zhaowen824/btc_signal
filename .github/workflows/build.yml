name: 终极构建

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 在临时目录创建全新的 Flutter 项目
        run: |
          cd /tmp
          flutter create --org com.example my_app
          cp -r $GITHUB_WORKSPACE/lib /tmp/my_app/
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/my_app/

      - name: 构建 APK
        run: |
          cd /tmp/my_app
          flutter pub get
          flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/my_app/build/app/outputs/flutter-apk/app-release.apk
