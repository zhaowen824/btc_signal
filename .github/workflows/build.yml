name: 构建 APK（Docker 环境 + 缓存）

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - name: 安装基础依赖
        run: |
          apt-get update
          apt-get install -y curl git unzip openjdk-17-jdk wget

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 缓存 Flutter
        uses: actions/cache@v3
        with:
          path: /opt/flutter
          key: flutter-stable-linux

      - name: 安装 Flutter
        run: |
          if [ ! -d "/opt/flutter" ]; then
            git clone https://github.com/flutter/flutter.git -b stable /opt/flutter
          fi
          echo "/opt/flutter/bin" >> $GITHUB_PATH

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取依赖
        run: |
          export PATH="$PATH:/opt/flutter/bin"
          flutter pub get

      - name: 构建 APK
        run: |
          export PATH="$PATH:/opt/flutter/bin"
          flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
