name: 构建 APK（强制 Kotlin 版本）

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 克隆你的代码
        uses: actions/checkout@v4

      - name: 创建全新项目并强制 Kotlin 版本
        run: |
          # 创建新项目
          cd /tmp
          flutter create --org com.example my_app

          # 复制核心代码
          cp -r $GITHUB_WORKSPACE/lib /tmp/my_app/
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/my_app/

          # 强制修改 Kotlin 版本
          cd /tmp/my_app
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/' android/build.gradle
          sed -i '/pluginManagement {/,/}/ s/plugins {/plugins {\n        id "org.jetbrains.kotlin.android" version "1.9.24" apply false/' android/settings.gradle

          # 清理 Gradle 缓存（关键）
          rm -rf ~/.gradle/caches/

      - name: 构建 APK
        run: |
          cd /tmp/my_app
          flutter pub get
          flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/my_app/build/app/outputs/flutter-apk/app-release.apk
