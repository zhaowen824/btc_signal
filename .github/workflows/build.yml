name: 构建 APK（Docker 环境 + 缓存）

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - name: 安装基础依赖
        run: |
          apt-get update
          apt-get install -y curl git unzip openjdk-17-jdk wget
      - name: 缓存 Flutter
        uses: actions/cache@v3
        with:
          path: /opt/flutter
          key: flutter-stable-linux
      - name: 安装 Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable /opt/flutter
          echo "$PATH:/opt/flutter/bin" >> $GITHUB_PATH
      - name: 缓存 Android SDK
        uses: actions/cache@v3
        with:
          path: /opt/android-sdk
          key: android-sdk-34-linux
      - name: 安装 Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip -d /opt/android-sdk
          yes | /opt/android-sdk/cmdline-tools/bin/sdkmanager --licenses
          /opt/android-sdk/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 获取依赖
        run: |
          export PATH="$PATH:/opt/flutter/bin:/opt/android-sdk/platform-tools"
          flutter pub get
      - name: 构建 APK
        run: |
          export PATH="$PATH:/opt/flutter/bin:/opt/android-sdk/platform-tools"
          flutter build apk --release
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
