name: 构建 APK（全新项目重建）

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 检出当前仓库
        uses: actions/checkout@v4

      - name: 创建全新临时项目
        run: |
          cd /tmp
          flutter create --org com.example btc_signal_new

      - name: 复制核心代码并修复 AndroidManifest.xml
        run: |
          # 复制核心代码
          cp -r $GITHUB_WORKSPACE/lib /tmp/btc_signal_new/
          cp $GITHUB_WORKSPACE/pubspec.yaml /tmp/btc_signal_new/

          # 直接用完整内容覆盖 AndroidManifest.xml（确保有效）
          cat > /tmp/btc_signal_new/android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <application
                  android:label="btc_signal"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: 构建 APK
        run: |
          cd /tmp/btc_signal_new
          flutter pub get
          flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/btc_signal_new/build/app/outputs/flutter-apk/app-release.apk
