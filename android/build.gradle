buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        mavenCentral()
        // Flutter's gradle plugin is hosted on the Flutter storage Maven repo
        maven { url 'https://storage.googleapis.com/download.flutter.io' }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        // Note: dev.flutter:flutter-gradle-plugin is not required here when using
        // the app_plugin_loader applied from the Flutter SDK in settings.gradle.
        // Removing the classpath entry avoids resolution errors in CI.
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://storage.googleapis.com/download.flutter.io' }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}
